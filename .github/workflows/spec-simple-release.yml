name: Release spec-simple

on:
  push:
    tags:
      - "spec-simple/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#spec-simple/}" >> "$GITHUB_OUTPUT"

      - name: Create local version tag for GoReleaser
        run: git tag "${{ steps.tag.outputs.version }}" HEAD

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          distribution: goreleaser
          args: release --clean
          workdir: packages/spec-simple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.version }}
